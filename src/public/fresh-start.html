<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresh Start - Hop On Sintra</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
    h1 { font-size: 2.5em; margin-bottom: 20px; }
    .spinner {
      width: 80px;
      height: 80px;
      margin: 40px auto;
      border: 8px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 1.2em;
      margin: 20px 0;
      opacity: 0.9;
      min-height: 30px;
    }
    .progress {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      margin: 30px 0;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: white;
      border-radius: 3px;
      width: 0%;
      animation: progress 5s ease-in-out forwards;
    }
    @keyframes progress {
      0% { width: 0%; }
      20% { width: 25%; }
      40% { width: 50%; }
      60% { width: 75%; }
      80% { width: 90%; }
      100% { width: 100%; }
    }
    .success { color: #4ade80; font-weight: bold; }
    .error { color: #f87171; font-weight: bold; }
    .info {
      margin-top: 30px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      font-size: 0.9em;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚍 Hop On Sintra</h1>
    <div class="spinner"></div>
    <div class="status" id="status">Starting fresh load...</div>
    <div class="progress"><div class="progress-bar"></div></div>
    <div class="info" id="info">Please wait while we prepare your experience...</div>
  </div>

  <script>
    const status = document.getElementById('status');
    const info = document.getElementById('info');
    
    async function freshStart() {
      try {
        // Step 1: Completely clear everything
        status.textContent = 'Clearing all caches...';
        await new Promise(r => setTimeout(r, 300));
        
        if ('caches' in window) {
          const keys = await caches.keys();
          console.log('Deleting', keys.length, 'caches');
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        
        // Step 2: Unregister all service workers
        status.textContent = 'Removing service workers...';
        await new Promise(r => setTimeout(r, 300));
        
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          console.log('Unregistering', regs.length, 'service workers');
          await Promise.all(regs.map(r => r.unregister()));
        }
        
        // Step 3: Clear all storage
        status.textContent = 'Clearing storage...';
        await new Promise(r => setTimeout(r, 300));
        
        // Save important data
        const lang = localStorage.getItem('language');
        const admin = localStorage.getItem('admin-session');
        const driver = localStorage.getItem('driver-session');
        
        // Clear everything
        localStorage.clear();
        sessionStorage.clear();
        
        // Restore important data
        if (lang) localStorage.setItem('language', lang);
        if (admin) localStorage.setItem('admin-session', admin);
        if (driver) localStorage.setItem('driver-session', driver);
        
        // Step 4: Clear IndexedDB
        status.textContent = 'Clearing databases...';
        await new Promise(r => setTimeout(r, 300));
        
        if ('indexedDB' in window && indexedDB.databases) {
          const dbs = await indexedDB.databases();
          for (const db of dbs) {
            if (db.name) indexedDB.deleteDatabase(db.name);
          }
        }
        
        // Step 5: Mark as completely fresh
        status.textContent = 'Preparing fresh start...';
        await new Promise(r => setTimeout(r, 500));
        
        sessionStorage.setItem('fresh-start-completed', 'true');
        sessionStorage.setItem('cache-cleared-v13-final', 'true');
        
        // Success!
        status.innerHTML = '<span class="success">✅ All clear!</span>';
        info.textContent = 'Redirecting to app...';
        
        await new Promise(r => setTimeout(r, 800));
        
        // Redirect with maximum cache busting
        const timestamp = Date.now();
        const random = Math.random().toString(36).substring(7);
        window.location.href = `/index.html?fresh=true&v=13&t=${timestamp}&r=${random}`;
        
      } catch (error) {
        console.error('Fresh start error:', error);
        status.innerHTML = '<span class="error">❌ Error occurred</span>';
        info.innerHTML = 
          'Please try:<br>' +
          '• Press Ctrl+Shift+R (or Cmd+Shift+R on Mac)<br>' +
          '• Or <a href="/index.html" style="color: white; text-decoration: underline;">click here</a>';
      }
    }
    
    // Check if already completed
    if (sessionStorage.getItem('fresh-start-completed')) {
      status.textContent = 'Already cleared, redirecting...';
      info.textContent = 'Taking you to the app...';
      const timestamp = Date.now();
      const random = Math.random().toString(36).substring(7);
      setTimeout(() => {
        window.location.href = `/index.html?v=13&t=${timestamp}&r=${random}`;
      }, 500);
    } else {
      // Start the fresh start process
      freshStart();
    }
  </script>
</body>
</html>
