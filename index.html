<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title & description shown before JS loads (what Google reads first) -->
    <title>Hop On Sintra — Unlimited Day Pass & Private Tours</title>
    <meta name="description" content="Explore Sintra's UNESCO palaces at your own pace. Hop-on hop-off tuk tuk day pass with unlimited rides and guaranteed seating. Book online instantly." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (social + Google rich results) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hop On Sintra" />
    <meta property="og:title" content="Hop On Sintra — Unlimited Day Pass & Private Tours" />
    <meta property="og:description" content="Explore Sintra's UNESCO palaces at your own pace. Hop-on hop-off tuk tuk day pass with unlimited rides and guaranteed seating. Book online instantly." />
    <meta property="og:url" content="https://www.hoponsintra.com/" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1585208798174-6cedd86e019a?w=1200&h=630&fit=crop&q=80" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hop On Sintra — Unlimited Day Pass & Private Tours" />
    <meta name="twitter:description" content="Explore Sintra's UNESCO palaces at your own pace. Hop-on hop-off tuk tuk day pass with unlimited rides and guaranteed seating." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1585208798174-6cedd86e019a?w=1200&h=630&fit=crop&q=80" />

    <!-- Favicon — required for Google Search to show logo next to results -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="72x72" href="/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png" />

    <!-- Canonical (overridden per-page by JS, but correct for homepage) -->
    <link rel="canonical" href="https://www.hoponsintra.com/" />

    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
