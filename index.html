<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title & description shown before JS loads (what Google reads first) -->
    <title>Hop On Sintra — Unlimited Day Pass & Private Tours</title>
    <meta name="description" content="Explore Sintra's UNESCO palaces at your own pace. Hop-on hop-off tuk tuk day pass with unlimited rides and guaranteed seating. Book online instantly." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (social + Google rich results) -->
    <!-- data-rh="true" lets react-helmet-async replace these on prerendered pages -->
    <meta data-rh="true" property="og:type" content="website" />
    <meta data-rh="true" property="og:site_name" content="Hop On Sintra" />
    <meta data-rh="true" property="og:title" content="Hop On Sintra — Unlimited Day Pass & Private Tours" />
    <meta data-rh="true" property="og:description" content="Explore Sintra's UNESCO palaces at your own pace. Hop-on hop-off tuk tuk day pass with unlimited rides and guaranteed seating. Book online instantly." />
    <meta data-rh="true" property="og:url" content="https://www.hoponsintra.com/" />
    <meta data-rh="true" property="og:image" content="https://dwiznaefeqnduglmcivr.supabase.co/storage/v1/object/public/make-3bd0ade8-images/IMG_1829-1778931539038.JPEG" />
    <meta data-rh="true" property="og:image:width" content="1200" />
    <meta data-rh="true" property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta data-rh="true" name="twitter:card" content="summary_large_image" />
    <meta data-rh="true" name="twitter:title" content="Hop On Sintra — Unlimited Day Pass & Private Tours" />
    <meta data-rh="true" name="twitter:description" content="Explore Sintra's UNESCO palaces at your own pace. Hop-on hop-off tuk tuk day pass with unlimited rides and guaranteed seating." />
    <meta data-rh="true" name="twitter:image" content="https://dwiznaefeqnduglmcivr.supabase.co/storage/v1/object/public/make-3bd0ade8-images/IMG_1829-1778931539038.JPEG" />

    <!-- Preconnect to origins used for LCP assets (hero image, API) -->
    <link rel="preconnect" href="https://dwiznaefeqnduglmcivr.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://dwiznaefeqnduglmcivr.supabase.co" />

    <!-- Preload LCP hero image so browser discovers it from HTML, not after JS executes -->
    <link
      rel="preload"
      as="image"
      href="https://dwiznaefeqnduglmcivr.supabase.co/storage/v1/object/sign/make-3bd0ade8-images/1762977905581_pena-palace-3.jpg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV8yNmFjMWMyYy1lNjZlLTQwYWEtYjcwNS1kNTcwYzA5NGZmYzMiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJtYWtlLTNiZDBhZGU4LWltYWdlcy8xNzYyOTc3OTA1NTgxX3BlbmEtcGFsYWNlLTMuanBnIiwiaWF0IjoxNzYyOTc3OTA1LCJleHAiOjIwNzgzMzc5MDV9.yMxtg8g3UvVUzf-xdAwUmGyjRATPWQwdvRlpIa8D7eY"
      fetchpriority="high"
    />

    <!-- Favicon — required for Google Search to show logo next to results -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="72x72" href="/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png" />

    <!-- Canonical (overridden per-page by JS, but correct for homepage) -->
    <link rel="canonical" href="https://www.hoponsintra.com/" />

    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
