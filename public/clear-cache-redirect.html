<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Clearing Cache...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      max-width: 500px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
    h1 {
      margin: 0 0 20px 0;
      font-size: 2em;
    }
    .spinner {
      width: 50px;
      height: 50px;
      margin: 20px auto;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      margin: 10px 0;
      opacity: 0.9;
    }
    .success {
      color: #4ade80;
      font-weight: bold;
    }
    .manual-refresh {
      margin-top: 30px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      font-size: 0.9em;
    }
    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 Clearing Cache</h1>
    <div class="spinner"></div>
    <div id="status" class="status">Initializing...</div>
    <div id="manual-refresh" class="manual-refresh" style="display: none;">
      If the page doesn't reload automatically:<br>
      Press <code>Ctrl+Shift+R</code> (Windows/Linux)<br>
      or <code>Cmd+Shift+R</code> (Mac)
    </div>
  </div>

  <script>
    const status = document.getElementById('status');
    const manualRefresh = document.getElementById('manual-refresh');

    async function clearEverything() {
      try {
        // Step 1: Clear Service Worker caches
        status.textContent = 'Clearing service worker caches...';
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          console.log(`Found ${cacheNames.length} caches`);
          
          for (const cacheName of cacheNames) {
            await caches.delete(cacheName);
            console.log(`Deleted cache: ${cacheName}`);
          }
        }
        
        // Step 2: Unregister Service Workers
        status.textContent = 'Unregistering service workers...';
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          
          for (const registration of registrations) {
            await registration.unregister();
            console.log('Unregistered service worker');
          }
        }
        
        // Step 3: Clear localStorage (preserve important data)
        status.textContent = 'Clearing localStorage...';
        const language = localStorage.getItem('language');
        const adminSession = localStorage.getItem('admin-session');
        const driverSession = localStorage.getItem('driver-session');
        
        localStorage.clear();
        
        if (language) localStorage.setItem('language', language);
        if (adminSession) localStorage.setItem('admin-session', adminSession);
        if (driverSession) localStorage.setItem('driver-session', driverSession);
        
        // Step 4: Clear sessionStorage
        status.textContent = 'Clearing sessionStorage...';
        sessionStorage.clear();
        
        // Step 5: Clear IndexedDB
        status.textContent = 'Clearing IndexedDB...';
        if ('indexedDB' in window && indexedDB.databases) {
          const databases = await indexedDB.databases();
          for (const db of databases) {
            if (db.name) {
              indexedDB.deleteDatabase(db.name);
              console.log(`Deleted IndexedDB: ${db.name}`);
            }
          }
        }
        
        // Success!
        status.innerHTML = '<span class="success">✅ Cache cleared successfully!</span>';
        
        // Wait 1 second, then redirect with cache-busting parameter
        await new Promise(resolve => setTimeout(resolve, 1000));
        status.textContent = 'Redirecting to home page...';
        
        await new Promise(resolve => setTimeout(resolve, 500));
        
        // Force reload with cache busting
        const timestamp = Date.now();
        window.location.href = '/?nocache=' + timestamp;
        
      } catch (error) {
        console.error('Error clearing cache:', error);
        status.innerHTML = '❌ Error clearing cache<br>Please try manual refresh';
        manualRefresh.style.display = 'block';
      }
    }

    // Start clearing immediately
    clearEverything();
  </script>
</body>
</html>
